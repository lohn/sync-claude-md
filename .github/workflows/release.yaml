name: Release

on:
  push:
    branches: [main]

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_needed: ${{ steps.check.outputs.release_needed }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      # https://github.com/marketplace/actions/create-github-app-token
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_APP_PRIVATE_KEY }}

      # https://github.com/marketplace/actions/checkout
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # A release is needed when the manifest version has no published release
      # yet: either the release PR was just merged, or a previous attempt only
      # produced a (still unpublished) draft.
      - name: Determine whether a release is needed
        id: check
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        # language=bash
        run: |
          set -euo pipefail
          version=$(jq -r '.["."]' .release-please-manifest.json)
          tag="v$version"
          if [ "$(gh release view "$tag" --json isDraft --jq '.isDraft' 2>/dev/null)" = "false" ]; then
            needed=false
          else
            needed=true
          fi
          {
            echo "release_needed=$needed"
            echo "tag=$tag"
          } >> "$GITHUB_OUTPUT"

      # Only the GitHub release is immutable, not the tag, so create the tag up
      # front. goreleaser then builds the draft release against it, and having
      # the tag present keeps release-please from re-proposing the release.
      - name: Create the release tag
        if: ${{ steps.check.outputs.release_needed == 'true' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ steps.check.outputs.tag }}
        # language=bash
        run: |
          set -euo pipefail
          if ! gh api "repos/$GH_REPO/git/ref/tags/$TAG" >/dev/null 2>&1; then
            gh api "repos/$GH_REPO/git/refs" -f "ref=refs/tags/$TAG" -f "sha=$GITHUB_SHA"
          fi

      # release-please only manages versioning and the release PR; goreleaser
      # creates the GitHub release. Labels are skipped so a merged-but-not-yet-
      # released PR can never block opening the next release PR.
      # https://github.com/marketplace/actions/release-please-action
      - name: Run release-please
        id: rp
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-release: true
          skip-labeling: true

      - name: Enable auto-merge on the release pull request
        if: ${{ steps.rp.outputs.prs_created == 'true' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          PRS: ${{ steps.rp.outputs.prs }}
        # language=bash
        run: |
          set -euo pipefail
          echo "$PRS" | jq -r '.[].number' | while read -r pr; do
            gh pr merge "$pr" --auto --squash
          done

  goreleaser:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_needed == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      # https://github.com/marketplace/actions/checkout
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.release-please.outputs.tag }}
          fetch-depth: 0

      - name: Initialize tools
        uses: ./.github/actions/init-tools
        with:
          cache-key: release

      # https://github.com/marketplace/actions/create-github-app-token
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_APP_PRIVATE_KEY }}

      # goreleaser creates the GitHub release as a draft (see .goreleaser.yaml)
      # and uploads every artifact, so all assets are present before publish.
      - name: Build and create the draft release with GoReleaser
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: goreleaser release --clean

      # https://github.com/marketplace/actions/attest-build-provenance
      - name: Attest build provenance for all artifacts
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: dist/checksums.txt

  npm-publish:
    needs: [release-please, goreleaser]
    if: ${{ needs.release-please.outputs.release_needed == 'true' }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      # https://github.com/marketplace/actions/checkout
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.release-please.outputs.tag }}

      - name: Initialize tools
        uses: ./.github/actions/init-tools
        with:
          cache-key: release

      - name: Download raw binaries from the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag }}
        # language=bash
        run: |
          gh release download "$TAG" --dir dist-bin \
            --pattern 'sync-claude-md_linux_*' \
            --pattern 'sync-claude-md_darwin_*' \
            --pattern 'sync-claude-md_windows_*'

      - name: Place binaries into platform packages
        # language=bash
        run: |
          set -euo pipefail
          install -m755 dist-bin/sync-claude-md_darwin_arm64      npm/@sync-claude-md/cli-darwin-arm64/sync-claude-md
          install -m755 dist-bin/sync-claude-md_darwin_amd64      npm/@sync-claude-md/cli-darwin-x64/sync-claude-md
          install -m755 dist-bin/sync-claude-md_linux_arm64       npm/@sync-claude-md/cli-linux-arm64/sync-claude-md
          install -m755 dist-bin/sync-claude-md_linux_amd64       npm/@sync-claude-md/cli-linux-x64/sync-claude-md
          install -m755 dist-bin/sync-claude-md_windows_arm64.exe npm/@sync-claude-md/cli-win32-arm64/sync-claude-md.exe
          install -m755 dist-bin/sync-claude-md_windows_amd64.exe npm/@sync-claude-md/cli-win32-x64/sync-claude-md.exe

      - name: Copy README into the meta package
        run: cp README.md npm/sync-claude-md/README.md

      - name: Publish platform packages then the meta package
        # language=bash
        run: |
          set -euo pipefail
          for d in darwin-arm64 darwin-x64 linux-arm64 linux-x64 win32-arm64 win32-x64; do
            npm publish --access public "npm/@sync-claude-md/cli-$d"
          done
          npm publish --access public npm/sync-claude-md

  pypi-publish:
    needs: [release-please, goreleaser]
    if: ${{ needs.release-please.outputs.release_needed == 'true' }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      # https://github.com/marketplace/actions/checkout
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.release-please.outputs.tag }}

      - name: Initialize tools
        uses: ./.github/actions/init-tools
        with:
          cache-key: release

      - name: Download raw binaries from the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag }}
        # language=bash
        run: |
          gh release download "$TAG" --dir dist-bin \
            --pattern 'sync-claude-md_linux_*' \
            --pattern 'sync-claude-md_darwin_*' \
            --pattern 'sync-claude-md_windows_*'

      - name: Copy README into pypi
        run: cp README.md pypi/README.md

      - name: Build platform wheels
        working-directory: pypi
        # language=bash
        run: |
          set -euo pipefail
          build_one() {
            local asset="$1" script="$2" tag="$3"
            cp "../dist-bin/$asset" "./$script"
            BINARY_PATH="$PWD/$script" SCRIPT_NAME="$script" WHEEL_TAG="$tag" \
              uv build --wheel --python 3.12 --out-dir dist .
            rm -f "./$script"
          }
          build_one sync-claude-md_linux_amd64       sync-claude-md     py3-none-manylinux_2_17_x86_64
          build_one sync-claude-md_linux_arm64       sync-claude-md     py3-none-manylinux_2_17_aarch64
          build_one sync-claude-md_darwin_arm64      sync-claude-md     py3-none-macosx_11_0_arm64
          build_one sync-claude-md_darwin_amd64      sync-claude-md     py3-none-macosx_10_9_x86_64
          build_one sync-claude-md_windows_amd64.exe sync-claude-md.exe py3-none-win_amd64
          build_one sync-claude-md_windows_arm64.exe sync-claude-md.exe py3-none-win_arm64

      - name: Validate wheels
        run: uvx twine check pypi/dist/*.whl

      # https://github.com/marketplace/actions/pypi-publish
      - name: Publish to PyPI via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: pypi/dist

  finalize-release:
    needs: [release-please, goreleaser, npm-publish, pypi-publish]
    if: ${{ needs.release-please.outputs.release_needed == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # https://github.com/marketplace/actions/create-github-app-token
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_APP_PRIVATE_KEY }}

      # All artifacts are attached to the draft by now; publishing locks the
      # release (immutable) with everything in place.
      - name: Publish the draft release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.release-please.outputs.tag }}
        # language=bash
        run: gh release edit "$TAG" --draft=false
