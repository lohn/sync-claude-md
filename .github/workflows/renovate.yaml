name: Renovate

on:
  schedule:
    # Every 15 minutes.
    - cron: "8/15 * * * *"
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Renovate log level"
        required: false
        default: "info"
        type: choice
        options:
          - debug
          - info
          - warn
          - error
      dryRun:
        description: "Renovate dry-run mode"
        required: false
        default: "disabled"
        type: choice
        options:
          - disabled
          - lookup
          - extract
          - full

permissions:
  contents: read

concurrency:
  group: renovate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  renovate:
    name: Run Renovate
    runs-on: ubuntu-latest
    steps:
      # https://github.com/marketplace/actions/checkout
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # https://github.com/marketplace/actions/create-github-app-token
      - name: Generate GitHub token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RENOVATE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RENOVATE_BOT_APP_PRIVATE_KEY }}

      - name: Resolve GitHub App identity
        id: app-identity
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          APP_SLUG: ${{ steps.generate-token.outputs.app-slug }}
        # language=bash
        run: |
          set -euo pipefail
          USER_JSON=$(gh api "/users/${APP_SLUG}[bot]")
          USER_ID=$(echo "$USER_JSON" | jq -r '.id')
          USER_LOGIN=$(echo "$USER_JSON" | jq -r '.login')
          {
            echo "user-id=${USER_ID}"
            echo "user-login=${USER_LOGIN}"
            echo "git-author=${USER_LOGIN} <${USER_ID}+${USER_LOGIN}@users.noreply.github.com>"
          } >> "$GITHUB_OUTPUT"

      - name: Initialize tools
        uses: ./.github/actions/init-tools
        with:
          cache-key: renovate

      - name: Run Renovate
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          RENOVATE_TOKEN: ${{ steps.generate-token.outputs.token }}
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
          RENOVATE_DRY_RUN: ${{ inputs.dryRun == 'disabled' && 'null' || inputs.dryRun || 'null' }}
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_PLATFORM: github
          RENOVATE_AUTODISCOVER: "false"
          RENOVATE_CONFIG_FILE: .github/renovate.json5
          RENOVATE_CONFIG: >-
            {"secrets":{"GH_TOKEN":"${{ steps.generate-token.outputs.token }}"},"customEnvVariables":{"GH_TOKEN":"{{ secrets.GH_TOKEN }}"}}
          RENOVATE_GIT_AUTHOR: ${{ steps.app-identity.outputs.git-author }}
          RENOVATE_USERNAME: ${{ steps.app-identity.outputs.user-login }}
          RENOVATE_BINARY_SOURCE: global
          # Allow Renovate to run `mise lock` (and `mise trust`) natively when
          # updating mise.lock files. Replaces the old postUpgradeTasks approach.
          RENOVATE_ALLOWED_UNSAFE_EXECUTIONS: '["mise"]'
        # language=bash
        run: renovate
