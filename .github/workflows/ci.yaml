name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # https://github.com/marketplace/actions/checkout
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Initialize tools
        uses: ./.github/actions/init-tools
        with:
          cache-key: ci

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -race ./...

      - name: Build
        run: go build -v ./...

  pre-commit:
    runs-on: ubuntu-latest
    steps:
      # A shallow depth derived from the PR commit count cannot reach
      # base.sha once the base branch advances past the PR's merge base,
      # so fetch full history for pull_request runs instead.
      # `0` must stay on the `||` fallback side: GitHub Actions treats `0`
      # as falsy, so `cond && 0 || 1` collapses to `1` for both outcomes.
      # https://github.com/marketplace/actions/checkout
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: ${{ github.event_name != 'pull_request' && 1 || 0 }}

      - name: Initialize tools
        uses: ./.github/actions/init-tools
        with:
          cache-key: ci

      - name: Run prek
        # language=bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            prek run --show-diff-on-failure --from-ref "${{ github.event.pull_request.base.sha }}"
          else
            prek run --show-diff-on-failure --all-files
          fi
