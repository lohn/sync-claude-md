default_install_hook_types:
  - pre-commit
  - commit-msg
  - pre-push

repos:
  - repo: meta
    hooks:
      - id: check-hooks-apply
      - id: check-useless-excludes

  - repo: https://github.com/renovatebot/pre-commit-hooks
    rev: 43.227.0
    hooks:
      - id: renovate-config-validator

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint-system

  - repo: https://github.com/lohn/pre-commit-mise-lock
    rev: v0.1.0
    hooks:
      - id: mise-lock

  - repo: local
    hooks:
      - id: sync-claude-md
        name: Sync CLAUDE.md with AGENTS.md
        stages: [pre-commit]
        description: Keep CLAUDE.md in sync with AGENTS.md (built from the local Go source)
        entry: go run ./cmd/sync-claude-md pre-commit
        language: system
        always_run: true
        pass_filenames: false
        require_serial: true

      - id: dprint-format
        name: dprint format
        stages: [pre-commit]
        description: Format using dprint
        entry: dprint fmt --allow-no-files
        language: unsupported
        pass_filenames: true

      - id: golangci-lint-fmt
        name: golangci-lint fmt
        stages: [pre-commit]
        description: Format Go source with golangci-lint (gofumpt, goimports)
        entry: golangci-lint fmt
        language: unsupported
        types: [go]
        pass_filenames: false
        require_serial: true

      - id: golangci-lint
        name: golangci-lint
        stages: [pre-commit]
        description: Lint Go source with golangci-lint
        entry: golangci-lint run
        language: unsupported
        types: [go]
        pass_filenames: false
        require_serial: true

      - id: go-mod-tidy
        name: go mod tidy
        stages: [pre-commit]
        description: Ensure go.mod and go.sum are tidy
        entry: go mod tidy
        language: unsupported
        files: '(\.go$|go\.mod$|go\.sum$)'
        pass_filenames: false
        require_serial: true

      - id: go-test
        name: go test
        stages: [pre-push]
        description: Run Go tests before pushing
        entry: go test ./...
        language: unsupported
        types: [go]
        pass_filenames: false
        require_serial: true

      - id: commitizen
        name: commitizen check
        description: Check whether the current commit message follows committing rules
        entry: cz check
        args: [--allow-abort, --commit-msg-file]
        language: unsupported
        stages: [commit-msg]

      - id: commitizen-branch
        name: commitizen check branch
        description: Check commit messages on the pushed branch
        entry: bash -c 'cz check --rev-range "$PRE_COMMIT_FROM_REF..$PRE_COMMIT_TO_REF"' --
        language: unsupported
        always_run: true
        pass_filenames: false
        stages: [pre-push]
