  entry: sync-claude-md pre-commit
  language: node
  always_run: true
  pass_filenames: false
  require_serial: true

- id: sync-claude-md-system
  name: Sync CLAUDE.md with AGENTS.md (system)
  description: Create, update, or clean up CLAUDE.md so it references AGENTS.md (uses a sync-claude-md binary already installed on PATH).
