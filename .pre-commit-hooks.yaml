- id: sync-claude-md
  name: Sync CLAUDE.md with AGENTS.md
  description: Create, update, or clean up CLAUDE.md so it references AGENTS.md (built from source via the Go toolchain).
  entry: sync-claude-md pre-commit
  language: golang
  always_run: true
  pass_filenames: false
  require_serial: true

- id: sync-claude-md-pip
  name: Sync CLAUDE.md with AGENTS.md (PyPI)
  description: Create, update, or clean up CLAUDE.md so it references AGENTS.md (installs the sync-claude-md wheel from PyPI; requires Python).
  entry: sync-claude-md pre-commit
  language: python
  always_run: true
  pass_filenames: false
  require_serial: true

- id: sync-claude-md-npm
